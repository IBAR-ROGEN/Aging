name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check src scripts tests

      - name: Run pytest
        run: uv run pytest -q

      - name: UKB repository compliance audit
        run: ./scripts/dev/ukbb_ci_compliance_audit.sh
